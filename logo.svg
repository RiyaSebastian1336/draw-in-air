<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Glowing filters -->
    <filter id="glow-burgundy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Burgundy and Ruby Gradients -->
    <linearGradient id="gradient-burgundy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#800020" />
      <stop offset="100%" stop-color="#e0115f" />
    </linearGradient>
    <linearGradient id="gradient-gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="100%" stop-color="#ff7b00" />
    </linearGradient>
  </defs>

  <!-- Background brush stroke -->
  <path d="M 30,130 C 50,60 150,40 170,110 C 180,140 140,170 100,165 C 60,160 30,110 50,70" 
        fill="none" stroke="url(#gradient-burgundy)" stroke-width="12" stroke-linecap="round" 
        filter="url(#glow-burgundy)" opacity="0.8"/>
  <path d="M 50,150 C 90,180 160,150 160,110 C 160,70 120,40 80,60 C 60,70 50,90 60,110" 
        fill="none" stroke="url(#gradient-gold)" stroke-width="6" stroke-linecap="round" 
        filter="url(#glow-gold)" opacity="0.95"/>

  <!-- Hand drawing gesture icon in center -->
  <g transform="translate(70, 50) scale(0.65)" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Palm outline -->
    <path d="M 25,90 C 25,95 30,110 45,110 C 60,110 65,95 65,90" />
    <!-- Pinky finger -->
    <path d="M 65,90 C 65,75 75,75 75,90 L 75,105" />
    <!-- Ring finger -->
    <path d="M 55,90 C 55,70 65,70 65,90" />
    <!-- Middle finger -->
    <path d="M 45,90 C 45,68 55,68 55,90" />
    <!-- Index finger (pointing UP) -->
    <path d="M 35,90 L 35,20 C 35,5 25,5 25,20 L 25,90" fill="#ffffff" fill-opacity="0.1" />
    <!-- Thumb -->
    <path d="M 10,75 C 5,75 5,60 15,60 C 25,60 25,75 25,90" />
    <!-- Wrist connection -->
    <path d="M 18,95 L 18,125 C 18,135 32,140 50,140 C 68,140 82,135 82,125 L 82,95" />
  </g>
</svg>
